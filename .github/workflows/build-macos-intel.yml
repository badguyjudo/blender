name: Build Blender macOS Intel x86_64

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      blender_tag:
        description: 'Blender version tag to build (e.g. v5.0.1)'
        required: true
        default: 'v5.0.1'
      build_deps:
        description: 'Force rebuild of dependencies'
        required: false
        type: boolean
        default: false

jobs:
  deps:
    name: Build Dependencies - macOS Intel
    runs-on: macos-26-intel
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.blender_tag }}
          fetch-depth: 1
          lfs: false
          submodules: false

      - name: Install build tools
        run: |
          brew install cmake git-lfs autoconf automake bison dos2unix flex libtool meson ninja pkg-config nasm yasm

      - name: Cache compiled dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: lib/macos_x64
          key: blender-deps-macos-intel-${{ github.event.inputs.blender_tag }}-v1
          restore-keys: |
            blender-deps-macos-intel-

      - name: Build dependencies from source
        if: steps.cache-deps.outputs.cache-hit != 'true' || github.event.inputs.build_deps == 'true'
        run: |
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="
            make deps NPROCS=$(sysctl -n hw.ncpu) && break
            echo "Attempt $attempt failed, retrying in 60s..."
            sleep 60
          done

      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-deps-macos-intel
          path: lib/macos_x64
          retention-days: 90

  build:
    name: Build Blender (${{ github.event.inputs.blender_tag }}) - macOS Intel
    runs-on: macos-26-intel
    needs: deps
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.blender_tag }}
          fetch-depth: 1
          lfs: false
          submodules: false

      - name: Install build tools
        run: |
          brew install cmake git-lfs

      - name: Restore cached dependencies
        uses: actions/cache@v4
        with:
          path: lib/macos_x64
          key: blender-deps-macos-intel-${{ github.event.inputs.blender_tag }}-v1
          restore-keys: |
            blender-deps-macos-intel-

      - name: Download dependencies artifact (fallback)
        if: hashFiles('lib/macos_x64') == ''
        uses: actions/download-artifact@v4
        with:
          name: blender-deps-macos-intel
          path: lib/macos_x64

      - name: Build Blender
        run: |
          make -j$(sysctl -n hw.ncpu)

      - name: List build output
        run: |
          ls -la ../build_darwin/bin/

      - name: Create DMG
        run: |
          APP_PATH="../build_darwin/bin/Blender.app"
          if [ -d "$APP_PATH" ]; then
            hdiutil create -volname "Blender" \
              -srcfolder "$APP_PATH" \
              -ov -format UDZO \
              "Blender-${{ github.event.inputs.blender_tag }}-macOS-intel.dmg"
          else
            echo "Blender.app not found, skipping DMG creation"
            ls -laR ../build_darwin/bin/ || true
          fi

      - name: Upload Blender.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blender-${{ github.event.inputs.blender_tag }}-macOS-intel
          path: |
            ../build_darwin/bin/Blender.app
          if-no-files-found: warn

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Blender-${{ github.event.inputs.blender_tag }}-macOS-intel-dmg
          path: "*.dmg"
          if-no-files-found: ignore
